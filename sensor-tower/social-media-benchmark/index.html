<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Social Media Engagement Benchmark</title>
<style>
  :root{
    --bg:#f4f6fa; --bgtint:#eef1f7; --panel:#ffffff; --panel2:#fbfcfe;
    --ink:#0b1220; --ink2:#283447; --muted:#6b7686; --faint:#9aa4b2;
    --line:#e7eaf0; --line2:#eef1f6; --grid:#eef1f7; --grid0:#d6dbe6;
    --chip:#eef1f7; --chip-ink:#5b6675;
    --accent:#4f46e5; --accent2:#7c6cf0; --accent-ink:#ffffff;
    --good:#15a34a; --good-bg:#dcfce7; --bad:#e11d48; --bad-bg:#ffe4e6; --flat-bg:#eef1f7;
    --tip-bg:#0b1220; --tip-ink:#ffffff; --tip-sub:#94a3b8; --tip-line:#1e293b;
    --shadow:0 1px 2px rgba(16,24,40,.04), 0 10px 30px rgba(16,24,40,.07);
    --card-shadow:0 1px 2px rgba(16,24,40,.05), 0 2px 6px rgba(16,24,40,.04);
  }
  html[data-theme="dark"]{
    --bg:#0a0f1c; --bgtint:#0d1424; --panel:#111a2e; --panel2:#0f1729;
    --ink:#eef2f8; --ink2:#c4cedd; --muted:#8c97a8; --faint:#5e6878;
    --line:#1e2840; --line2:#18213500; --grid:#19223a; --grid0:#2c3a57;
    --chip:#1a2440; --chip-ink:#aab4c4;
    --accent:#7c6cf0; --accent2:#9b8cff; --accent-ink:#ffffff;
    --good:#34d399; --good-bg:#0c3a26; --bad:#fb7185; --bad-bg:#3d1422; --flat-bg:#1a2440;
    --tip-bg:#1c2740; --tip-ink:#ffffff; --tip-sub:#9fb0c7; --tip-line:#2a3650;
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 14px 40px rgba(0,0,0,.45);
    --card-shadow:0 1px 2px rgba(0,0,0,.3), 0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45;
  }
  .wrap{max-width:1340px; margin:0 auto; padding:24px 22px 64px;}
  .tnum{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1;}

  header.top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:18px;}
  .brand{display:flex; align-items:center; gap:13px;}
  .mark{width:42px;height:42px;border-radius:12px;flex:0 0 auto;background:linear-gradient(135deg,var(--accent),var(--accent2));
        box-shadow:0 6px 16px rgba(79,70,229,.35); position:relative;}
  .mark::before,.mark::after{content:"";position:absolute;border-radius:2px;background:#fff;}
  .mark::before{left:9px;bottom:9px;width:4px;height:13px;opacity:.95;box-shadow:7px 0 0 #fff, 14px -5px 0 #fff;}
  header.top h1{font-size:23px; margin:0 0 3px; letter-spacing:-.5px; font-weight:750;}
  header.top .sub{color:var(--muted); font-size:12.5px;}
  header.top .sub b{color:var(--ink2);}
  .topright{display:flex; flex-direction:column; align-items:flex-end; gap:9px;}
  .src{text-align:right; color:var(--faint); font-size:11.5px; line-height:1.55;}
  .src b{color:var(--muted); font-weight:600;}
  .excl{display:inline-block; background:var(--bad-bg); color:var(--bad); border-radius:999px; padding:1px 9px; font-size:11px; font-weight:650;}
  .theme-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;box-shadow:var(--card-shadow);transition:.15s;}
  .theme-btn:hover{color:var(--ink); border-color:var(--grid0);}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);}
  .controls{padding:15px 17px; margin-bottom:16px; display:flex; flex-direction:column; gap:11px;}
  .ctrl-row{display:flex; align-items:center; gap:11px; flex-wrap:wrap;}
  .ctrl-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.7px; color:var(--faint); font-weight:750; min-width:72px;}
  .seg{display:inline-flex; background:var(--chip); border-radius:11px; padding:3px; gap:2px;}
  .seg button{border:0; background:transparent; color:var(--chip-ink); font:inherit; font-weight:600; font-size:13px; padding:6px 13px; border-radius:8px; cursor:pointer; transition:.13s; white-space:nowrap;}
  .seg button:hover{color:var(--ink);}
  .seg button.on{background:var(--panel); color:var(--accent); box-shadow:0 1px 3px rgba(16,24,40,.14);}
  html[data-theme="dark"] .seg button.on{background:#243156; color:var(--accent2);}
  .seg.dark button.on{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:var(--accent-ink); box-shadow:0 3px 10px rgba(79,70,229,.35);}
  .switch{display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); font-weight:600; cursor:pointer; user-select:none;}
  .switch input{accent-color:var(--accent); width:15px; height:15px;}
  .sep{width:1px; height:22px; background:var(--line);}

  .legend{display:flex; flex-wrap:wrap; gap:8px;}
  .lg{display:inline-flex; align-items:center; gap:7px; padding:5px 12px 5px 9px; border:1px solid var(--line); border-radius:999px; cursor:pointer; font-weight:600; font-size:12.5px; background:var(--panel); transition:.13s; color:var(--ink2);}
  .lg .dot{width:10px; height:10px; border-radius:50%; flex:0 0 auto;}
  .lg.off{opacity:.4; background:var(--chip);}
  .lg:hover{border-color:var(--grid0);}

  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(176px,1fr)); gap:13px; margin:16px 0;}
  .kpi{padding:13px 14px 8px; position:relative; overflow:hidden; transition:opacity .15s, transform .15s, box-shadow .15s; cursor:default;}
  .kpi:hover{transform:translateY(-2px); box-shadow:var(--shadow);}
  .kpi .ktop{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .kpi .name{display:flex; align-items:center; gap:7px; font-weight:650; font-size:12.5px; color:var(--ink2);}
  .kpi .name .dot{width:9px; height:9px; border-radius:50%;}
  .kpi .rank{font-size:10.5px; font-weight:700; color:var(--faint); background:var(--chip); border-radius:6px; padding:1px 6px;}
  .kpi .val{font-size:24px; font-weight:760; letter-spacing:-.6px; margin-top:7px; line-height:1;}
  .kpi .sub{display:flex; gap:7px; align-items:center; margin-top:5px; font-size:12px;}
  .chip{font-weight:700; border-radius:6px; padding:1px 6px; font-size:11.5px;}
  .chip.up{color:var(--good); background:var(--good-bg);}
  .chip.down{color:var(--bad); background:var(--bad-bg);}
  .chip.flat{color:var(--muted); background:var(--flat-bg);}
  .kpi .sub .lbl{color:var(--faint);}
  .kpi .spark{margin-top:8px; height:34px;}

  .chart-card{padding:17px 18px 10px; margin-bottom:16px;}
  .chart-head{display:flex; justify-content:space-between; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:2px;}
  .chart-head h2{font-size:15.5px; margin:0; font-weight:720; letter-spacing:-.2px;}
  .chart-head .unit{font-size:12px; color:var(--faint);}
  .chart-wrap{position:relative; width:100%;}
  svg{display:block; width:100%; overflow:visible;}
  .tooltip{position:absolute; pointer-events:none; background:var(--tip-bg); color:var(--tip-ink); border-radius:10px; padding:9px 11px; font-size:12px; box-shadow:0 10px 30px rgba(0,0,0,.28); opacity:0; transition:opacity .08s; min-width:158px; z-index:5; border:1px solid var(--tip-line);}
  .tooltip .tt-date{font-weight:700; margin-bottom:6px; font-size:11.5px; color:var(--tip-sub); border-bottom:1px solid var(--tip-line); padding-bottom:5px; letter-spacing:.2px;}
  .tooltip .tt-row{display:flex; align-items:center; gap:8px; margin:3.5px 0; white-space:nowrap;}
  .tooltip .tt-row .d{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .tooltip .tt-row .nm{flex:1; color:#e2e8f0;}
  html[data-theme="dark"] .tooltip .tt-row .nm{color:#dbe3ee;}
  .tooltip .tt-row .vv{font-weight:700;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media(max-width:900px){ .grid2{grid-template-columns:1fr;} }

  text{font-family:inherit;}
  .ax{fill:var(--muted); font-size:11px;}
  .axb{fill:var(--ink2); font-size:11.5px; font-weight:650;}
  .gl{stroke:var(--grid); stroke-width:1;}
  .gl0{stroke:var(--grid0); stroke-width:1;}
  .track{fill:var(--chip);}
  footer{color:var(--faint); font-size:11.5px; margin-top:22px; line-height:1.65;}
  footer b{color:var(--muted);}
  .note-est{display:inline-block; width:9px;height:9px;border-radius:2px;background:transparent;border:1px dashed var(--faint);vertical-align:middle;margin:0 2px;}
  a.k{color:var(--accent); text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>Social Media Engagement Benchmark</h1>
        <div class="sub" id="subline"></div>
      </div>
    </div>
    <div class="topright">
      <button class="theme-btn" id="themeBtn"><span id="themeIcon"></span><span id="themeTxt">Dark</span></button>
      <div class="src" id="srcbox"></div>
    </div>
  </header>

  <div class="panel controls">
    <div class="ctrl-row">
      <span class="ctrl-label">View</span>
      <div class="seg dark" id="sectionSeg">
        <button data-v="engagement" class="on">Engagement</button>
        <button data-v="monetization">Monetization</button>
      </div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Metric</span>
      <div class="seg" id="metricSeg"></div>
    </div>
    <div class="ctrl-row" id="row3">
      <span class="ctrl-label" id="regionLabel">Region</span>
      <div class="seg" id="regionSeg">
        <button data-v="US" class="on">United States</button>
        <button data-v="Intl">International</button>
      </div>
      <span class="sep" id="sep1"></span>
      <span class="ctrl-label" style="min-width:auto">Scale</span>
      <div class="seg" id="scaleSeg"></div>
      <label class="switch" id="logWrap"><input type="checkbox" id="logChk"/> Log</label>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Range</span>
      <div class="seg" id="rangeSeg"></div>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Platforms</span>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="panel chart-card">
    <div class="chart-head">
      <h2 id="lineTitle"></h2>
      <span class="unit" id="lineUnit"></span>
    </div>
    <div class="chart-wrap" id="lineWrap">
      <div class="tooltip" id="tooltip"></div>
    </div>
  </div>

  <div class="grid2">
    <div class="panel chart-card">
      <div class="chart-head"><h2 id="snapTitle"></h2><span class="unit" id="snapUnit"></span></div>
      <div class="chart-wrap" id="snapWrap"></div>
    </div>
    <div class="panel chart-card">
      <div class="chart-head"><h2>Growth — latest year-over-year</h2><span class="unit">% vs. same period last year</span></div>
      <div class="chart-wrap" id="growWrap"></div>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

/* ---------- number formatting ---------- */
function nf(v,d){ return v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }

};
var AX = {
  totaltime: function(v){ return v===0?'0':nf(v/1000,1)+'B'; },
  dailytime: function(v){ return nf(v,0); },
  users:     function(v){ return v>=1000? nf(v/1000,1)+'k' : nf(v,0); },
  downloads: function(v){ return nf(v,0); },
  us_arpu:function(v){ return '$'+nf(v,0); }, intl_arpu:function(v){ return '$'+nf(v,0); },

};

];
var MON_METRICS = [

  {k:'intl_arpu',   label:'ARPU — Int’l',       unit:'Avg revenue per user, international ($/quarter)'},
  {k:'us_revhour',  label:'Rev / Hour — US',    unit:'Revenue per hour spent, US ($)'},
  {k:'intl_revhour',label:'Rev / Hour — Int’l', unit:'Revenue per hour spent, international ($)'}
];

var state = {

/* ---------- helpers ---------- */
function lastNonNull(arr){ for(var i=arr.length-1;i>=0;i--){ if(arr[i]!=null) return {i:i,v:arr[i]}; } return null; }
function firstNonNull(arr,from){ for(var i=from||0;i<arr.length;i++){ if(arr[i]!=null) return arr[i]; } return null; }
function yoy(arr, lag){
  var L=lastNonNull(arr); if(!L) return {val:null,yy:null};
  var j=L.i-lag; var prev=(j>=0)?arr[j]:null;
  return {val:L.v, yy:(prev!=null&&prev!==0)?(L.v-prev)/prev:null, idx:L.i};
}
function niceStep(x){ if(x<=0)return 1; var p=Math.pow(10,Math.floor(Math.log10(x))); var n=x/p,f;
  if(n<=1)f=1; else if(n<=2)f=2; else if(n<=2.5)f=2.5; else if(n<=5)f=5; else f=10; return f*p; }
function niceRange(min,max){
  if(!isFinite(min)||!isFinite(max)||min===max){ min=(min||0)-1; max=(max||0)+1; }
  var step=niceStep((max-min)/5);
  var lo=Math.floor(min/step)*step, hi=Math.ceil(max/step)*step, ticks=[];
  for(var v=lo; v<=hi+step*1e-6; v+=step) ticks.push(+v.toFixed(6));
  return {lo:lo,hi:hi,ticks:ticks};
}

function meta(k,arr){ for(var i=0;i<arr.length;i++) if(arr[i].k===k) return arr[i]; return arr[0]; }

/* ================= RENDER ================= */
function render(){
  var c=ctx();

  document.getElementById('regionLabel').style.display=isEng?'inline':'none';

}
function buildSeg(id,list,cur,onpick){
  var seg=document.getElementById(id);
  seg.innerHTML=list.map(function(m){ var k=m.k||m; var l=m.l||m.label;
    return '<button data-v="'+k+'" class="'+(k===cur?'on':'')+'">'+l+'</button>'; }).join('');

    b.onclick=function(){ onpick(b.dataset.v); render(); }; });
}
function buildLegend(c){
  var lg=document.getElementById('legend');

    el.onmouseleave=function(){ applyFocus(null); };
  });

/* ---------- sparkline ---------- */
function sparkline(arr,color,id){
  var w=150,h=34,pad=3, n=Math.min(24,arr.length);
  var slice=arr.slice(arr.length-n);
  var xs=[],vmin=Infinity,vmax=-Infinity;
  slice.forEach(function(v){ if(v!=null){ if(v<vmin)vmin=v; if(v>vmax)vmax=v; } });
  if(vmin===Infinity){ return '<svg viewBox="0 0 '+w+' '+h+'"></svg>'; }
  if(vmin===vmax){vmin-=1;vmax+=1;}
  function X(i){ return pad + (w-2*pad)*i/(n-1); }
  function Y(v){ return pad + (h-2*pad)*(1-(v-vmin)/(vmax-vmin)); }
  var d='',pen=false,lastX=0,lastY=h;
  for(var i=0;i<n;i++){ var v=slice[i]; if(v==null){pen=false;continue;} var x=X(i),y=Y(v);
    d+=(pen?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' '; pen=true; lastX=x; lastY=y; }
  var area=d+'L'+lastX.toFixed(1)+' '+h+' L'+X(0).toFixed(1)+' '+h+' Z';
  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1">'+

    '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>'+
    '<circle cx="'+lastX.toFixed(1)+'" cy="'+lastY.toFixed(1)+'" r="2.4" fill="'+color+'"/></svg>';
}

/* ---------- KPI cards (always absolute) ---------- */
function renderKPIs(c){
  var box=document.getElementById('kpis');
  var vis=visibleCompanies(c);
  var ranked=vis.map(function(n){ var L=lastNonNull(c.series[n]); return {n:n,v:L?L.v:-Infinity}; })
                .sort(function(a,b){return b.v-a.v;});
  var rankOf={}; ranked.forEach(function(r,i){ rankOf[r.n]=i+1; });
  box.innerHTML=vis.map(function(n,ix){
    var r=yoy(c.series[n], c.yoyLag);
    var valStr=(r.val!=null)?c.fmt(r.val):'–';
    var cls=(r.yy==null)?'flat':(r.yy>0.0005?'up':(r.yy<-0.0005?'down':'flat'));
    var arrow=(cls==='up')?'▲':(cls==='down')?'▼':'–';
    return '<div class="panel kpi" data-c="'+n+'">'+
      '<div class="ktop"><span class="name"><span class="dot" style="background:'+COLORS[n]+'"></span>'+n+'</span>'+
        '<span class="rank">#'+rankOf[n]+'</span></div>'+
      '<div class="val tnum">'+valStr+'</div>'+
      '<div class="sub"><span class="chip '+cls+'">'+arrow+' '+pct(r.yy)+'</span><span class="lbl">y/y</span></div>'+
      '<div class="spark">'+sparkline(c.series[n],COLORS[n],'sp_'+c.kind+'_'+ix)+'</div>'+
    '</div>';
  }).join('');
  Array.prototype.forEach.call(box.querySelectorAll('.kpi'),function(el){
    var n=el.dataset.c;
    el.onmouseenter=function(){ applyFocus(n); };
    el.onmouseleave=function(){ applyFocus(null); };
  });
}

function svgEl(w,h){ return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet" width="'+w+'" height="'+h+'">'; }

/* ---------- transform for scale modes ---------- */
function transform(c, vis, idxOffset, N){
  // returns {data:{name:[vals]}, fmt, ax, yMode}
  var out={}, mode=state.scale;
  if(mode==='absolute'){
    vis.forEach(function(n){ out[n]=c.series[n].slice(idxOffset); });
    return {data:out, fmt:c.fmt, ax:c.ax, mode:'absolute'};
  }
  if(mode==='indexed'){
    vis.forEach(function(n){
      var s=c.series[n].slice(idxOffset);
      var base=firstNonNull(s);
      out[n]=s.map(function(v){ return (v==null||base==null||base===0)?null:v/base*100; });
    });
    return {data:out, fmt:function(v){return nf(v,0);}, ax:function(v){return nf(v,0);}, mode:'indexed'};
  }
  // share %
  vis.forEach(function(n){ out[n]=[]; });
  for(var i=0;i<N;i++){
    var tot=0; vis.forEach(function(n){ var v=c.series[n][i+idxOffset]; if(v!=null&&v>0)tot+=v; });
    vis.forEach(function(n){ var v=c.series[n][i+idxOffset]; out[n].push((tot>0&&v!=null)?v/tot*100:null); });
  }
  return {data:out, fmt:function(v){return nf(v,1)+'%';}, ax:function(v){return nf(v,0)+'%';}, mode:'share'};
}

/* ---------- LINE CHART ---------- */
function renderLine(c){
  var scaleTag = state.scale==='indexed' ? ' · indexed to 100' : state.scale==='share' ? ' · share of shown' : '';
  document.getElementById('lineTitle').textContent=c.title+(c.kind==='eng'?(' — '+(state.region==='US'?'United States':'International')):'');
  document.getElementById('lineUnit').textContent=c.unit+scaleTag;

  var wrap=document.getElementById('lineWrap'), tip=document.getElementById('tooltip');
  var W=Math.max(360, wrap.clientWidth||900), H=448;
  var mL=58, mR=18, mT=16, mB=40, pw=W-mL-mR, ph=H-mT-mB;

  var dates=c.periods.slice(), idxOffset=0;
  if(c.range!=='all'){ var rn=parseInt(c.range,10); if(dates.length>rn){ idxOffset=dates.length-rn; dates=dates.slice(idxOffset); } }
  var N=dates.length;
  var vis=visibleCompanies(c);
  var T=transform(c, vis, idxOffset, N);

  var maxV=-Infinity,minV=Infinity,minPos=Infinity;
  vis.forEach(function(n){ T.data[n].forEach(function(v){ if(v!=null){ if(v>maxV)maxV=v; if(v<minV)minV=v; if(v>0&&v<minPos)minPos=v; } }); });
  if(maxV===-Infinity){ maxV=1; minV=0; }

  var useLog=(T.mode==='absolute' && state.log && minPos<Infinity && minPos>0);
  var yScale,yticks,fmtAx=T.ax;
  if(useLog){
    var loE=Math.floor(Math.log10(minPos)), hiE=Math.ceil(Math.log10(maxV)); if(hiE<=loE)hiE=loE+1;
    yScale=function(v){ return mT+ph*(1-(Math.log10(v)-loE)/(hiE-loE)); };
    yticks=[]; for(var e=loE;e<=hiE;e++) yticks.push(Math.pow(10,e));
  } else {
    var lo = (T.mode==='indexed')? minV : 0;
    var rng=niceRange(lo, maxV);
    yScale=function(v){ return mT+ph*(1-(v-rng.lo)/(rng.hi-rng.lo)); };
    yticks=rng.ticks;
  }
  var xScale=function(i){ return N<=1? mL+pw/2 : mL+pw*i/(N-1); };

  var defs='<defs>';
  vis.forEach(function(n,ix){ var col=COLORS[n];
    defs+='<linearGradient id="ar_'+ix+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+col+'" stop-opacity="0.22"/><stop offset="1" stop-color="'+col+'" stop-opacity="0"/></linearGradient>'; });
  defs+='</defs>';
  var svg=svgEl(W,H)+defs;

  yticks.forEach(function(t){ var y=yScale(t);
    svg+='<line class="'+(t===0?'gl0':'gl')+'" x1="'+mL+'" y1="'+y.toFixed(1)+'" x2="'+(W-mR)+'" y2="'+y.toFixed(1)+'"/>';
    svg+='<text class="ax" x="'+(mL-9)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end">'+fmtAx(t)+'</text>'; });

  var xticksIdx=[];
  if(c.isMonth){ for(var i=0;i<N;i++){ var mo=dates[i].split('-')[1]; if(mo==='01'||(N<=26&&mo==='07'))xticksIdx.push(i); } }
  else { for(var i2=0;i2<N;i2++){ if(dates[i2].indexOf('1Q')===0)xticksIdx.push(i2); } }
  if(xticksIdx.indexOf(N-1)<0)xticksIdx.push(N-1);
  xticksIdx.forEach(function(i){ var x=xScale(i),lbl;
    if(c.isMonth) lbl=monthLabel(dates[i]); else lbl=(i===N-1)?dates[i]:"'"+dates[i].split("'")[1].slice(0,2);
    svg+='<text class="ax" x="'+x.toFixed(1)+'" y="'+(H-mB+18)+'" text-anchor="middle">'+lbl+'</text>'; });

  var single=(vis.length===1 && T.mode!=='share');
  vis.forEach(function(n,ix){ var arr=T.data[n], col=COLORS[n];
    var d='',pen=false,segs=[];
    for(var i=0;i<N;i++){ var v=arr[i]; if(v==null||(useLog&&v<=0)){pen=false;continue;}
      var x=xScale(i),y=yScale(v); d+=(pen?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' '; pen=true; }
    if(single && d){
      // build area to baseline
      var base=yScale(useLog?Math.pow(10,Math.floor(Math.log10(minPos))):(yticks[0]));
      var first=null,last=null;
      for(var j=0;j<N;j++){ if(arr[j]!=null){ if(first==null)first=j; last=j; } }
      if(first!=null){ var area=d+'L'+xScale(last).toFixed(1)+' '+base.toFixed(1)+' L'+xScale(first).toFixed(1)+' '+base.toFixed(1)+' Z';
        svg+='<path d="'+area+'" fill="url(#ar_'+ix+')"/>'; }
    }
    svg+='<path class="series" data-c="'+n+'" d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2.3" stroke-linejoin="round" stroke-linecap="round"/>';
    var L=lastNonNull(arr); if(L){ svg+='<circle class="enddot" data-c="'+n+'" cx="'+xScale(L.i).toFixed(1)+'" cy="'+yScale(L.v).toFixed(1)+'" r="3.3" fill="'+col+'"/>'; }
  });

  svg+='<g id="hguide" style="display:none"></g>';
  svg+='<rect id="hoverlay" x="'+mL+'" y="'+mT+'" width="'+pw+'" height="'+ph+'" fill="transparent"/>';
  svg+='</svg>';
  wrap.innerHTML=svg; wrap.appendChild(tip);

  var svgNode=wrap.querySelector('svg'), overlay=wrap.querySelector('#hoverlay'), guide=wrap.querySelector('#hguide');
  overlay.addEventListener('mousemove',function(evt){
    var r=svgNode.getBoundingClientRect(), sx=W/r.width;
    var px=(evt.clientX-r.left)*sx;
    var i=Math.round((px-mL)/pw*(N-1)); i=Math.max(0,Math.min(N-1,i));
    var gx=xScale(i), dots='', rows=[];
    vis.forEach(function(n){ var v=T.data[n][i]; if(v==null||(useLog&&v<=0))return;
      dots+='<circle cx="'+gx.toFixed(1)+'" cy="'+yScale(v).toFixed(1)+'" r="3.7" fill="var(--panel)" stroke="'+COLORS[n]+'" stroke-width="2"/>';
      rows.push({nm:n,v:v}); });
    guide.style.display='block';
    guide.innerHTML='<line class="gl0" x1="'+gx+'" x2="'+gx+'" y1="'+mT+'" y2="'+(mT+ph)+'"/>'+dots;
    rows.sort(function(a,b){return b.v-a.v;});
    var head=c.isMonth?monthLong(dates[i]):dates[i];
    tip.innerHTML='<div class="tt-date">'+head+'</div>'+rows.map(function(rw){
      return '<div class="tt-row"><span class="d" style="background:'+COLORS[rw.nm]+'"></span><span class="nm">'+rw.nm+'</span><span class="vv tnum">'+T.fmt(rw.v)+'</span></div>';
    }).join('');
    tip.style.opacity='1';
    var rx=evt.clientX-r.left, ry=evt.clientY-r.top, tw=tip.offsetWidth, th=tip.offsetHeight, dispH=H*(r.width/W);
    var left=rx+18; if(left+tw>r.width)left=rx-tw-18; if(left<0)left=4;
    var top=ry-th/2; if(top<2)top=2; if(top+th>dispH)top=dispH-th-2;
    tip.style.left=left+'px'; tip.style.top=top+'px';
  });
  overlay.addEventListener('mouseleave',function(){ guide.style.display='none'; tip.style.opacity='0'; });
}

/* ---------- focus (dim non-hovered) ---------- */
function applyFocus(name){
  state.focus=name;
  Array.prototype.forEach.call(document.querySelectorAll('#lineWrap path.series'),function(p){
    var on=!name||p.dataset.c===name; p.style.opacity=on?'1':'0.1'; p.style.strokeWidth=(name&&on)?'3.4':'2.3'; });
  Array.prototype.forEach.call(document.querySelectorAll('#lineWrap circle.enddot'),function(d){
    d.style.opacity=(!name||d.dataset.c===name)?'1':'0.1'; });
  Array.prototype.forEach.call(document.querySelectorAll('.kpi'),function(k){
    k.style.opacity=(!name||k.dataset.c===name)?'1':'0.38'; });
  Array.prototype.forEach.call(document.querySelectorAll('.lg'),function(l){
    if(l.classList.contains('off')){ l.style.opacity=''; return; }
    l.style.opacity=(!name||l.dataset.n===name)?'1':'0.4'; });
}

/* ---------- horizontal bars ---------- */
function hbar(wrapId, rows, opt){
  var wrap=document.getElementById(wrapId);
  var W=Math.max(320, wrap.clientWidth||500);
  var rowH=40, mT=8, mB=6, mL=92, mR=66, H=mT+mB+rows.length*rowH, pw=W-mL-mR;
  var maxAbs=0; rows.forEach(function(r){ if(Math.abs(r.value)>maxAbs)maxAbs=Math.abs(r.value); }); if(maxAbs<=0)maxAbs=1;
  var neg=opt&&opt.neg, zeroX=neg?mL+pw*0.5:mL, fullW=neg?pw*0.5:pw;
  var svg=svgEl(W,H);
  if(neg) svg+='<line class="gl0" x1="'+zeroX+'" y1="'+mT+'" x2="'+zeroX+'" y2="'+(H-mB)+'"/>';
  rows.forEach(function(r,i){ var cy=mT+i*rowH, by=cy+8, bh=rowH-18;
    if(!neg) svg+='<rect class="track" x="'+mL+'" y="'+by+'" width="'+pw+'" height="'+bh+'" rx="5"/>';
    var w=Math.abs(r.value)/maxAbs*fullW, x=(r.value<0)?zeroX-w:zeroX;
    svg+='<text class="axb" x="'+(mL-10)+'" y="'+(by+bh/2+4)+'" text-anchor="end">'+r.name+'</text>';
    svg+='<rect x="'+x.toFixed(1)+'" y="'+by+'" width="'+Math.max(2,w).toFixed(1)+'" height="'+bh+'" rx="5" fill="'+r.color+'"/>';
    var lx=(r.value<0)?x-7:x+w+7, anc=(r.value<0)?'end':'start';
    svg+='<text class="axb tnum" x="'+lx.toFixed(1)+'" y="'+(by+bh/2+4)+'" text-anchor="'+anc+'">'+r.display+'</text>'; });
  svg+='</svg>'; wrap.innerHTML=svg;
}
function renderSnapshot(c){
  document.getElementById('snapTitle').textContent='Latest snapshot — '+(c.isMonth?monthLong(c.periods[c.periods.length-1]):c.periods[c.periods.length-1].replace('E',' (est.)'));
  document.getElementById('snapUnit').textContent=c.unit;
  var vis=visibleCompanies(c);
  var rows=vis.map(function(n){ var L=lastNonNull(c.series[n]); var v=L?L.v:0; return {name:n,value:v,display:c.fmt(v),color:COLORS[n]}; });
  rows.sort(function(a,b){return b.value-a.value;});
  hbar('snapWrap',rows,{neg:false});
}
function renderGrowth(c){
  var vis=visibleCompanies(c);
  var rows=vis.map(function(n){ var r=yoy(c.series[n],c.yoyLag); var g=(r.yy==null)?0:r.yy;
    return {name:n,value:g,display:pct(r.yy),color:(g>=0?'#15a34a':'#e11d48')}; });
  rows.sort(function(a,b){return b.value-a.value;});
  hbar('growWrap',rows,{neg:true});
}

/* ---------- wire ---------- */
(function(){
  var sec=document.getElementById('sectionSeg');
  Array.prototype.forEach.call(sec.querySelectorAll('button'),function(b){
    b.onclick=function(){ Array.prototype.forEach.call(sec.querySelectorAll('button'),function(x){x.classList.remove('on');});
      b.classList.add('on'); state.section=b.dataset.v; state.focus=null; render(); }; });
  var reg=document.getElementById('regionSeg');
  Array.prototype.forEach.call(reg.querySelectorAll('button'),function(b){
    b.onclick=function(){ Array.prototype.forEach.call(reg.querySelectorAll('button'),function(x){x.classList.remove('on');});
      b.classList.add('on'); state.region=b.dataset.v; render(); }; });
  document.getElementById('logChk').onchange=function(){ state.log=this.checked; render(); };
  // theme
  var btn=document.getElementById('themeBtn');
  var MOON='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-1px"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  var SUN='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-1px"><circle cx="12" cy="12" r="4"/><path d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1.1 1.1M17.3 17.3l1.1 1.1M18.4 5.6l-1.1 1.1M6.7 17.3l-1.1 1.1"/></svg>';
  function setTheme(t){ document.documentElement.dataset.theme=t;
    document.getElementById('themeIcon').innerHTML=(t==='dark')?SUN:MOON;
    document.getElementById('themeTxt').textContent=(t==='dark')?'Light':'Dark';
    try{ localStorage.setItem('smb_theme',t); }catch(e){} render(); }
  btn.onclick=function(){ setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'); };
  var saved='light'; try{ saved=localStorage.getItem('smb_theme')||'light'; }catch(e){}
  setTheme(saved);
})();

document.getElementById('subline').innerHTML='Monthly engagement through <b>'+monthLong(META.lastMonthly)+'</b> · quarterly monetization through '+META.lastQuarter.replace('E',' (est.)')+' · <span class="excl">excludes Yelp &amp; Snap</span>';
document.getElementById('srcbox').innerHTML='Source: <b>'+META.source+'</b><br/>Built '+META.generated;
