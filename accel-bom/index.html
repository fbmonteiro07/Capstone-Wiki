<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2128; --border:#30363d; --border2:#21262d;
  --text:#e6edf3; --text2:#8b949e; --text3:#6e7681;
  --blue:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#e3b341; --purple:#bc8cff; --teal:#2dd4bf;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:20px}
.h-title{font-size:1.05rem;font-weight:700}
.h-sub{font-size:.75rem;color:var(--text2);margin-top:1px}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.75rem;color:var(--text2)}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto}
.tab{padding:12px 16px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.panel{display:none;padding:20px 28px}
.panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.card-head{padding:11px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.card-title{font-size:.9rem;font-weight:700}
.card-sub{font-size:.72rem;color:var(--text3)}
.hbm-bar{display:flex;gap:14px;flex-wrap:wrap;padding:12px 16px;align-items:flex-end}
.hbm-item label{display:block;font-size:.68rem;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.hbm-item input{width:74px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--orange);font-weight:700;padding:5px 8px;font-size:.85rem}
.hbm-item input.changed{border-color:var(--orange)}
.btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--blue);font-size:.78rem;font-weight:600;padding:7px 14px;cursor:pointer}
.btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.pills{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px}
.pill{padding:6px 14px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:.78rem;color:var(--text2);background:var(--surface2)}
.pill:hover{color:var(--text);border-color:var(--text3)}
.pill.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.grid-2{display:grid;grid-template-columns:7fr 5fr;gap:16px}
@media(max-width:1000px){.grid-2{grid-template-columns:1fr}}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 16px}
.kpi{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px}
.kpi .l{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.kpi .v{font-size:1.05rem;font-weight:700;margin-top:3px}
.kpi .s{font-size:.68rem;color:var(--text2);margin-top:2px}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{padding:6px 10px;text-align:right;border-bottom:1px solid var(--border2);white-space:nowrap}
th{color:var(--text2);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.03em}
td:first-child,th:first-child{text-align:left}
tr.tot td{font-weight:700;border-top:1px solid var(--border)}
.dim{color:var(--text3)}
.pos{color:var(--green)}.neg{color:var(--red)}.org{color:var(--orange)}.blu{color:var(--blue)}
.bom-input{width:78px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 7px;font-size:.8rem;text-align:right}
.bom-input.changed{border-color:var(--orange);color:var(--orange);font-weight:700}
.tbl-wrap{overflow-x:auto}
.chart-box{padding:12px;height:340px}
.note{font-size:.73rem;color:var(--text2);padding:10px 16px;border-top:1px solid var(--border2);line-height:1.5}
.delta{font-size:.68rem;margin-left:6px}
.memo{font-size:.7rem;color:var(--text3);padding:0 16px 12px}
.stackbar{display:flex;height:26px;border-radius:6px;overflow:hidden;margin:10px 16px}
.stackbar div{height:100%}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:0 16px 12px;font-size:.7rem;color:var(--text2)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px}
</style>
</head>

function normGen(t){
  t = (t||'').toUpperCase();
  if (t.includes('HBM4/')) return 'HBM4';
  if (t.includes('HBM4E')) return 'HBM4E';
  if (t.includes('HBM4')) return 'HBM4';
  if (t.includes('HBM3E')) return 'HBM3E';
  if (t.includes('HBM3')) return 'HBM3';
  if (t.includes('HBM2E')) return 'HBM2E';
  if (t.includes('HBM2')) return 'HBM2';
  return null; // GDDR7 / LPDDR / SRAM / DDR5...
}

  c.consigned = (c.tab === 'AWS' && c.hbmCost === 0 && c.totalGB > 0);

  c.dieOnly = (c.dieTotal != null) ? c.dieTotal - (c.pkgTest||0) : null;
  c.pkgRatio = (c.dieOnly > 0 && c.pkgTest != null) ? c.pkgTest / c.dieOnly : null;
  c.hasDie = (c.waferCost != null && c.yield != null && c.diesPerWafer != null && c.nDie != null);
});

function calc(c){
  const o = ovr[c.idx] || {};
  const gen = c.gen;
  const pGB = (o.hbm != null) ? o.hbm : (gen ? hbmPrice[gen] : c.hbmPrice);
  const hbmMkt = (c.totalGB||0) * (pGB||0);              // market value of memory
  const hbm = c.consigned ? 0 : hbmMkt;                  // in BOM (AWS consigned = 0)
  const wafer = (o.wafer != null) ? o.wafer : c.waferCost;
  const yld = (o.yld != null) ? o.yld : c.yield;
  let dieTotal = c.dieOnly || 0, costPerDie = c.costPerDie;
  if (c.hasDie) { costPerDie = wafer/(c.diesPerWafer*yld); dieTotal = costPerDie*c.nDie; }
  const pkg = (c.pkgRatio != null) ? c.pkgRatio*dieTotal : (c.pkgTest||0);
  const intc = c.intCost||0, board = c.boardIO||0;
  const total = hbm + intc + dieTotal + pkg + board;
  const gm = (o.gm != null) ? o.gm : c.gm;
  let asp = null;
  if (c.complete || total > 0) {
    if (c.logicGm != null) asp = (total - hbm)/(1-((o.gm!=null?o.gm:c.logicGm))) + hbm/(1-(c.hbmGm||0));
    else if (gm != null) asp = total/(1-gm);
  }
  const pw = (powerMode==='allin') ? (c.sa ? c.sa.allin : null) : c.tdp;
  const chipsGW = pw ? 1e9/pw : null;
  return { pGB, hbm, hbmMkt, intc, dieTotal, costPerDie, pkg, board, total, asp, gm,
           hbmShare: total>0 ? hbm/total : 0,
           powerW: pw, powerEst: (powerMode==='allin' && c.sa && c.sa.est) || false,
           chipsGW, bomGW: chipsGW&&total ? total*chipsGW/1e9 : null,
           aspGW: chipsGW&&asp ? asp*chipsGW/1e9 : null,
           streetGW: chipsGW&&c.streetAsp ? c.streetAsp*chipsGW/1e9 : null,
           saGW: chipsGW&&c.saAsp ? c.saAsp*chipsGW/1e9 : null };
}

  el.onclick = () => { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    el.classList.add('active'); document.getElementById('p-'+t).classList.add('active');
    if (t==='Overview') drawCharts(); };
  tabbar.appendChild(el);
  const p = document.createElement('div');
  p.className = 'panel'+(i===0?' active':''); p.id = 'p-'+t;
  panels.appendChild(p);
});

function hbmBarHTML(){
  return `<div class="card"><div class="card-head"><div class="card-title">HBM $/GB — global</div>
    <div class="card-sub">muda o preço da geração e recalcula B.O.M, ASP e $/GW de todos os chips (Jefferies: HBM2/2E $11 · HBM3 $11 · HBM3E $14 · HBM4 $16 · HBM4E $18)</div></div>
    <div class="hbm-bar">${HBM_GENS.map(g =>
      `<div class="hbm-item"><label>${g}</label><input type="number" step="0.5" min="0" data-gen="${g}" value="${hbmPrice[g]}"></div>`).join('')}

      <div style="display:flex;gap:6px">

const selected = {};  // tab -> chip idx
function companyPanelHTML(tab){
  const list = CHIPS.filter(c=>c.tab===tab);
  const comp = list.filter(c=>c.complete);
  const sel = selected[tab] != null ? selected[tab] : (comp.length? comp.reduce((a,b)=>(b.asp||0)>(a.asp||0)?b:a).idx : list[0].idx);
  selected[tab] = sel;
  return hbmBarHTML() + `
  <div class="card"><div class="pills">${list.map(c =>
    `<div class="pill${c.idx===sel?' active':''}${c.complete?'':' dim'}" onclick="selChip('${tab}',${c.idx})">${esc(c.chip)}</div>`).join('')}</div></div>
  <div id="detail-${tab}"></div>
  <div class="card"><div class="card-head"><div class="card-title">${tab} — todos os chips</div>
    <div class="card-sub">recalculado ao vivo com os inputs acima</div></div>
    <div class="tbl-wrap"><table id="ctable-${tab}"></table></div></div>`;
}

window.selChip = (tab, idx) => { selected[tab]=idx; renderTab(tab); };
window.resetHBM = () => { hbmPrice={...HBM_DEFAULT}; renderAll(); };

function detailHTML(c){

  <div class="card-head"><div class="card-title">${esc(c.chip)}</div>
    <div class="card-sub">${esc(c.designer)} · ${esc(c.launch)} · node ${esc(c.node)} · ${esc(c.hbmType)} ${c.totalGB?c.totalGB+'GB'+(c.stacks?' ('+c.stacks+'×'+c.gbPerStack+'GB)':''):''} · ${esc(c.intType)}${c.consigned?' · <span class="org">HBM consignada pela Amazon (fora do B.O.M do chip)</span>':''}</div>

    <div>
      <div class="tbl-wrap"><table>
        <tr><th>Componente</th><th>Premissa</th><th>Custo</th><th>% B.O.M</th></tr>
        <tr><td>HBM ${c.consigned?'<span class="dim">(consignada)</span>':''}</td>
          <td>${c.gen?`<input class="bom-input${(o.hbm!=null||dHBM)?' changed':''}" type="number" step="0.5" value="${(r.pGB??0).toFixed(1)}" onchange="setOvr(${c.idx},'hbm',this.value)"> $/GB × ${c.totalGB}GB`:'<span class="dim">'+esc(c.hbmType)+(c.hbmPrice?` $${c.hbmPrice}/GB`:'')+'</span>'}</td>
          <td class="org">${c.consigned?'<span class="dim">$0 ('+fmt$(r.hbmMkt)+' mkt)</span>':fmt$(r.hbm)}</td><td>${fmtP(r.hbmShare)}</td></tr>
        <tr><td>Interposer <span class="dim">${esc(c.intType)}</span></td><td class="dim">fixo Jefferies</td><td>${fmt$(r.intc)}</td><td>${fmtP(r.total?r.intc/r.total:null)}</td></tr>
        <tr><td>Compute die ${c.nDie?`<span class="dim">${c.nDie}×</span>`:''}</td>
          <td>${c.hasDie?`wafer <input class="bom-input${o.wafer!=null?' changed':''}" type="number" step="500" value="${Math.round(o.wafer!=null?o.wafer:c.waferCost)}" onchange="setOvr(${c.idx},'wafer',this.value)"> · yield <input class="bom-input${o.yld!=null?' changed':''}" style="width:54px" type="number" step="0.05" min="0.1" max="1" value="${(o.yld!=null?o.yld:c.yield).toFixed(2)}" onchange="setOvr(${c.idx},'yld',this.value)"> · ${c.diesPerWafer} dies/wafer`:'<span class="dim">monolítico / fixo</span>'}</td>
          <td class="blu">${fmt$(r.dieTotal)}</td><td>${fmtP(r.total?r.dieTotal/r.total:null)}</td></tr>
        <tr><td>Pkg / Test</td><td class="dim">${c.pkgRatio!=null?(100*c.pkgRatio).toFixed(0)+'% do die':'fixo'}</td><td>${fmt$(r.pkg)}</td><td>${fmtP(r.total?r.pkg/r.total:null)}</td></tr>
        <tr><td>Board, NVL, I/O & outros dies</td><td class="dim">fixo Jefferies</td><td>${fmt$(r.board)}</td><td>${fmtP(r.total?r.board/r.total:null)}</td></tr>
        <tr class="tot"><td>Total B.O.M</td><td></td><td>${fmt$(r.total)}</td><td>100%</td></tr>
        <tr><td>${gmLabel}</td>

          <td class="org">${fmt$(r.asp)}</td>
          <td>${c.asp?`<span class="delta ${r.asp>c.asp?'neg':'pos'}">${(100*(r.asp/c.asp-1)).toFixed(1)}%</span>`:''}</td></tr>
      </table></div>
      <div class="stackbar">${segs.map(s=>`<div style="width:${r.total?100*s[1]/r.total:0}%;background:${s[2]}"></div>`).join('')}</div>

    </div>
    <div>
      <div class="kpis">
        <div class="kpi"><div class="l">HBM % do B.O.M</div><div class="v org">${fmtP(r.hbmShare)}</div><div class="s">${c.consigned?'consignada':fmt$(r.hbm)}</div></div>
        <div class="kpi"><div class="l">Total B.O.M</div><div class="v">${fmt$(r.total)}</div><div class="s">Jefferies ${fmt$(c.totalCost)}</div></div>
        <div class="kpi"><div class="l">ASP</div><div class="v">${fmt$(r.asp)}</div><div class="s">GM ${fmtP(r.asp?1-r.total/r.asp:null)}</div></div>
        <div class="kpi"><div class="l">${powerMode==='allin'?'All-in / chip':'TDP'}</div><div class="v">${r.powerW?Math.round(r.powerW).toLocaleString('en-US')+' W':'—'}</div><div class="s">${powerMode==='allin'
            ? (c.sa?`SemiAnalysis: ${esc(c.sa.sa)}${c.sa.est?' · estimado':''} · chip ${c.tdp||c.sa.tdp} W`:'sem match na SemiAnalysis')
            : (c.tdpEst?'estimativa (não consta na Jefferies)':'por package')+(c.sa?` · all-in SA ${Math.round(c.sa.allin).toLocaleString('en-US')} W`:'')}</div></div>
        <div class="kpi"><div class="l">Chips por GW</div><div class="v">${fmtK(r.chipsGW)}</div><div class="s">${powerMode==='allin'?'1 GW all-in (SemiAnalysis)':'1 GW de TDP de chip'}</div></div>
        <div class="kpi"><div class="l">Custo por GW${c.saAsp?' · ref SA':''}</div><div class="v blu">${fmt$B(c.saAsp?r.saGW:r.aspGW)}</div><div class="s">${c.saAsp?`a ASP SA (ref) · implícito ${fmt$B(r.aspGW)}`:'a ASP implícito'} · street ${fmt$B(r.streetGW)} · B.O.M ${fmt$B(r.bomGW)}</div></div>

      <div class="memo">Custo por GW = ASP × (1e9 / W). Base "Chip TDP" = TDP de package (Jefferies); base "All-in" = All-in Chip Power da SemiAnalysis (Specs Sheet, abr-26): chip + parcela do servidor (CPU, NIC, fans, perdas) por acelerador. Só silício do acelerador no custo — não inclui resto do servidor, rede, prédio e energia.${c.consigned?' Para AWS, ASP exclui HBM (consignada): custo real por GW p/ Amazon soma a HBM de mercado.':''}</div>
    </div>
  </div></div>`;
}

window.setOvr = (idx, k, v) => {
  v = parseFloat(v);
  if (!ovr[idx]) ovr[idx] = {};
  if (isNaN(v)) delete ovr[idx][k]; else ovr[idx][k] = v;
  renderTab(CHIPS[idx].tab);
};

function companyTableHTML(tab){
  const list = CHIPS.filter(c=>c.tab===tab && c.complete);
  let h = `<tr><th>Chip</th><th>Launch</th><th>Node</th><th>HBM</th><th>GB</th><th>$/GB</th><th>HBM $</th><th>HBM %</th><th>B.O.M</th><th>ASP</th><th>Street</th><th>SA ASP</th><th>GM</th><th>${powerMode==='allin'?'All-in W':'TDP W'}</th><th>chips/GW</th><th>$B/GW (ASP)</th><th>$B/GW (street)</th><th>$B/GW (SA)</th></tr>`;
  list.forEach(c => { const r = calc(c);
    h += `<tr><td>${esc(c.chip)}${c.warn?` <span class="org" title="${esc(c.warn)}">⚠</span>`:''}</td><td class="dim">${esc(c.launch)}</td><td class="dim">${esc(c.node)}</td><td>${esc(c.hbmType)}</td><td>${c.totalGB||'—'}</td><td>${r.pGB!=null&&c.gen?'$'+r.pGB:'—'}</td><td class="org">${c.consigned?'<span class="dim">consig.</span>':fmt$(r.hbm)}</td><td>${fmtP(r.hbmShare)}</td><td>${fmt$(r.total)}</td><td>${fmt$(r.asp)}</td><td class="dim">${fmt$(c.streetAsp)}</td><td class="dim">${c.saAsp?`<span title="${esc(c.saAspSrc)}">${fmt$(c.saAsp)}</span>`:'—'}</td><td>${fmtP(r.asp?1-r.total/r.asp:null)}</td><td>${r.powerW?Math.round(r.powerW)+(r.powerEst?'<span class="org">*</span>':''):'—'}</td><td>${fmtK(r.chipsGW)}</td><td class="blu">${fmt$B(r.aspGW)}</td><td>${fmt$B(r.streetGW)}</td><td class="org">${fmt$B(r.saGW)}</td></tr>`;
  });
  return h;
}

/* ---------- overview ---------- */
function overviewHTML(){
  return hbmBarHTML() + `
  <div class="card"><div class="card-head"><div class="card-title">Custo por GW ${powerMode==='allin'?'all-in (SemiAnalysis)':'de TDP de chip'} — ASP implícito vs street ($B)</div>
    <div class="card-sub">quanto custa 1 GW de aceleradores ao preço de venda — referência = ASP SemiAnalysis (barras coloridas, ordena o gráfico); cinza = implícito Jefferies (B.O.M ÷ (1−GM)) e street (coluna CHECK); Rubin Ultra SA ÷2 (pacote = 2 chips na base Jefferies)</div></div>
    <div class="chart-box"><canvas id="ch-gw"></canvas></div></div>
  <div class="grid-2">
  <div class="card"><div class="card-head"><div class="card-title">HBM como % do B.O.M</div></div>
    <div class="chart-box" style="height:300px"><canvas id="ch-hbm"></canvas></div></div>
  <div class="card"><div class="card-head"><div class="card-title">B.O.M vs ASP ($/chip)</div></div>
    <div class="chart-box" style="height:300px"><canvas id="ch-asp"></canvas></div></div>
  </div>
  <div class="card"><div class="card-head"><div class="card-title">HBM como % do B.O.M — evolução no tempo</div>
    <div class="card-sub">por data de launch (Jefferies) · só chips com HBM e B.O.M completo · exclui Trainium (HBM consignada, fora do B.O.M) · recalcula com o HBM $/GB acima · linhas por designer</div></div>
    <div class="chart-box"><canvas id="ch-hbmtime"></canvas></div></div>
  <div class="card"><div class="card-head"><div class="card-title">Todos os chips</div>
    <div class="card-sub">B.O.M completo Jefferies · recalcula com HBM global acima</div></div>
    <div class="tbl-wrap"><table id="otable"></table></div>
  <div class="note">Fonte: Jefferies "Semiconductor AI Chips - Accelerator Characteristics" (AI Model, abr-26). Custos por chip: HBM (GB × $/GB), interposer (CoWoS/SoIC), compute die (wafer ÷ dies ÷ yield), pkg/test e board/IO. ASP = custo ÷ (1−GM); para TPU/MTIA/Maia a Jefferies usa GM só na lógica com HBM repassada a custo; Trainium tem HBM consignada pela Amazon. TDP da aba Chip Performance; Rubin CPX é estimativa pública. Base "All-in" usa o All-in Chip Power da SemiAnalysis ("Semianalysis Apr 26.xlsx", Specs Sheet Output): potência por acelerador incluindo a parcela do servidor (CPU, NIC, fans, perdas de PSU) — * = sem linha na SemiAnalysis, estimado pelo ratio all-in/TDP da família. Custo por GW considera apenas o acelerador (sem PUE/rede/prédio). <span class="org">⚠ Caveat (auditoria jun-26):</span> o "TDP" da Jefferies não é uma base única — para NVIDIA/AMD flagship é TDP de package genuíno, mas para Trainium 2/3/4 e alguns TPUs aproxima o all-in da SemiAnalysis (ex.: Trainium 3 904W ≈ all-in 923W vs chip 570W), o que deprime artificialmente o $/GW desses chips na base TDP; a comparação cross-vendor é mais honesta na base All-in. Linhas com ⚠ têm divergência de dado vs fonte/SemiAnalysis (hover para detalhe). <b>ASP de referência SA</b>: seção "ASP ($/unit)" do Accelerator Supply Output (1º trimestre com preço ≈ ASP at launch, mesma base do ASP Jefferies); hover na coluna SA ASP mostra a linha usada. Atenção à base nos ASICs: linhas Broadcom/Google = chip completo c/ HBM, linhas GUC/Marvell/Alchip = receita do designer (pode excluir HBM); Trainium 2 usa o gross ASP da Marvell (ex-HBM, mesma base da Jefferies); Trainium 3/4 sem ASP de chip completo comparável na SA.</div></div>`;
}

  const order = [...CHIPS].filter(c=>c.complete).sort((a,b)=> (calc(b).aspGW||0) - (calc(a).aspGW||0));

  order.forEach(c => { const r = calc(c);
    h += `<tr><td><span style="color:${COMPANY_COLOR[c.tab]}">●</span> ${esc(c.tab)} <span class="dim">${esc(c.designer)}</span></td><td>${esc(c.chip)}${c.warn?` <span class="org" title="${esc(c.warn)}">⚠</span>`:''}</td><td class="dim">${esc(c.launch)}</td><td>${esc(c.hbmType)}</td><td>${c.totalGB||'—'}</td><td class="org">${c.consigned?'<span class="dim">consig.</span>':fmt$(r.hbm)}</td><td>${fmtP(r.hbmShare)}</td><td>${fmt$(r.total)}</td><td>${fmt$(r.asp)}</td><td class="dim">${fmt$(c.streetAsp)}</td><td class="dim">${c.saAsp?`<span title="${esc(c.saAspSrc)}">${fmt$(c.saAsp)}</span>`:'—'}</td><td>${fmtP(r.asp?1-r.total/r.asp:null)}</td><td>${r.powerW?Math.round(r.powerW)+'W'+(r.powerEst?'<span class="org">*</span>':''):'—'}</td><td class="blu">${fmt$B(r.aspGW)}</td><td>${fmt$B(r.streetGW)}</td><td class="org">${fmt$B(r.saGW)}</td></tr>`;
  });
  return h;
}

let charts = {};
function drawCharts(){
  const yr = c => { const m = (c.launch||'').match(/(\d{2})\s*E?\s*$/); return m ? parseInt(m[1]) : null; };
  const cur = CHIPS.filter(c => c.complete && c.tdp && (yr(c) == null || yr(c) >= 24));
  const gwKey = c => { const r = calc(c); return (r.saGW != null ? r.saGW : r.aspGW) || 0; };
  const byGW = [...cur].sort((a,b)=>gwKey(b)-gwKey(a));
  const mk = (id, cfg) => { if (charts[id]) charts[id].destroy(); charts[id] = new Chart(document.getElementById(id), cfg); };
  const gridC = '#21262d', tickC = '#8b949e';
  mk('ch-gw', { type:'bar',
    data:{ labels: byGW.map(c=>c.chip), datasets:[
      { label:'SemiAnalysis ASP (referência)', data: byGW.map(c=>calc(c).saGW), backgroundColor: byGW.map(c=>COMPANY_COLOR[c.tab]) },
      { label:'ASP implícito Jefferies', data: byGW.map(c=>calc(c).aspGW), backgroundColor:'#8b949e' },
      { label:'Street ASP', data: byGW.map(c=>calc(c).streetGW), backgroundColor:'#444c56' }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:tickC}}},
      scales:{ x:{ticks:{color:tickC,maxRotation:60,minRotation:45},grid:{color:gridC}}, y:{ticks:{color:tickC,callback:v=>'$'+v+'B'},grid:{color:gridC}} } }});
  const byHBM = [...cur].sort((a,b)=>calc(b).hbmShare-calc(a).hbmShare);
  mk('ch-hbm', { type:'bar', data:{ labels:byHBM.map(c=>c.chip), datasets:[{ data: byHBM.map(c=>100*calc(c).hbmShare), backgroundColor:'#e3b341' }]},
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:tickC,callback:v=>v+'%'},grid:{color:gridC}}, y:{ticks:{color:tickC,font:{size:10}},grid:{display:false}} } }});
  const parseLaunch = s => {
    if (!s) return null;
    let m = s.match(/^([1-4])Q(\d{2})E?$/i); if (m) return 2000 + +m[2] + (+m[1]-0.5)/4;
    m = s.match(/^([12])H(\d{2})E?$/i); if (m) return 2000 + +m[2] + (+m[1]===1 ? 0.25 : 0.75);
    m = s.match(/^(\d{4})E?$/); if (m) return +m[1] + 0.5;
    return null;
  };
  const hbmT = CHIPS.filter(c => c.complete && c.gen && !c.consigned && parseLaunch(c.launch) != null);
  mk('ch-hbmtime', { type:'scatter',
    data:{ datasets: TABS.filter(t => hbmT.some(c=>c.tab===t)).map(t => ({
      label: t,
      data: hbmT.filter(c=>c.tab===t)
        .map(c => ({x: parseLaunch(c.launch), y: 100*calc(c).hbmShare, chip: c.chip, launch: c.launch}))
        .sort((a,b)=>a.x-b.x),
      backgroundColor: COMPANY_COLOR[t], borderColor: COMPANY_COLOR[t],
      showLine: true, borderWidth: 1.5, pointRadius: 4, pointHoverRadius: 6, tension: 0
    }))},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{labels:{color:tickC}},
        tooltip:{callbacks:{label: ctx => `${ctx.raw.chip} · ${ctx.raw.launch}: ${ctx.raw.y.toFixed(0)}% do B.O.M`}} },
      scales:{ x:{type:'linear', ticks:{color:tickC, stepSize:1, callback:v=>Number.isInteger(v)?v:''}, grid:{color:gridC}},
               y:{min:0, ticks:{color:tickC, callback:v=>v+'%'}, grid:{color:gridC}} } }});
  mk('ch-asp', { type:'bar',
    data:{ labels: byGW.map(c=>c.chip), datasets:[
      { label:'B.O.M', data: byGW.map(c=>calc(c).total), backgroundColor:'#58a6ff' },
      { label:'ASP', data: byGW.map(c=>calc(c).asp), backgroundColor:'#3fb950' }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:tickC}}},
      scales:{ x:{ticks:{color:tickC,maxRotation:60,minRotation:45,font:{size:9}},grid:{color:gridC}}, y:{ticks:{color:tickC,callback:v=>'$'+(v/1000)+'k'},grid:{color:gridC}} } }});
}

/* ---------- render ---------- */
function bindHBMInputs(panel){
  panel.querySelectorAll('input[data-gen]').forEach(inp => {
    if (hbmPrice[inp.dataset.gen] !== HBM_DEFAULT[inp.dataset.gen]) inp.classList.add('changed');
    inp.onchange = () => { const v = parseFloat(inp.value);
      if (!isNaN(v)) { hbmPrice[inp.dataset.gen] = v; renderAll(); } };
  });
}
function renderTab(tab){
  const p = document.getElementById('p-'+tab);
  if (tab === 'Overview') {
    p.innerHTML = overviewHTML();
    document.getElementById('otable').innerHTML = overviewTableHTML();
    bindHBMInputs(p);
    if (p.classList.contains('active')) drawCharts();
  } else {
    p.innerHTML = companyPanelHTML(tab);
    document.getElementById('detail-'+tab).innerHTML = detailHTML(CHIPS[selected[tab]]);
    document.getElementById('ctable-'+tab).innerHTML = companyTableHTML(tab);
    bindHBMInputs(p);
  }
}
function renderAll(){ TABS.forEach(renderTab); }
document.getElementById('reset-all').onclick = () => { hbmPrice={...HBM_DEFAULT}; ovr={}; renderAll(); };
renderAll();
</script>
